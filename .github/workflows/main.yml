name: Auto Anime Scraper

on:
  schedule:
    - cron: '0 */6 * * *' # Ye har 6 ghante mein automate chalega
  workflow_dispatch:      # Isse tu button daba kar manually bhi chala sakta hai

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v2

      - name: Set up Python
        uses: actions/setup-python@v2
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install requests gspread google-auth

      - name: Run Scraper
        env:
          GCP_CREDENTIALS: ${{ secrets.GCP_CREDENTIALS }}
          TMDB_KEY: ${{ secrets.TMDB_KEY }}
        run: python scraper.py
